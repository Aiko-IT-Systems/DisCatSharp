name: Build Voice Natives

on:
    workflow_dispatch:

jobs:
    build-linux:
        runs-on: ${{ matrix.runs_on }}
        strategy:
            matrix:
                include:
                    - arch: x64
                      runs_on: ubuntu-latest
                      expected_arch: x86-64
                      extra_cflags: ""
                    - arch: arm64
                      runs_on: ubuntu-24.04-arm
                      expected_arch: aarch64
                      extra_cflags: "-flax-vector-conversions"

        steps:
            - uses: actions/checkout@v6

            - name: Install deps
              run: |
                  sudo apt-get update
                  sudo apt-get install -y build-essential autoconf automake libtool pkg-config

            - name: Download libsodium
              run: |
                  curl -L https://download.libsodium.org/libsodium/releases/libsodium-1.0.21.tar.gz -o sodium.tar.gz
                  tar xzf sodium.tar.gz

            - name: Build libsodium
              run: |
                  cd libsodium-*
                  ./configure --enable-shared --disable-static CFLAGS="${{ matrix.extra_cflags }}"
                  make -j$(nproc)

            - name: Verify binary architecture
              run: |
                  file -L libsodium-*/src/libsodium/.libs/libsodium.so
                  file -L libsodium-*/src/libsodium/.libs/libsodium.so | grep -qi "${{ matrix.expected_arch }}"

            - name: Copy binary
              run: |
                  mkdir -p DisCatSharp.Voice.Natives/runtimes/linux-${{ matrix.arch }}/native
                  cp -L libsodium-*/src/libsodium/.libs/libsodium.so \
                     DisCatSharp.Voice.Natives/runtimes/linux-${{ matrix.arch }}/native/

            - uses: actions/upload-artifact@v7
              with:
                  name: sodium-linux-${{ matrix.arch }}
                  path: DisCatSharp.Voice.Natives/runtimes/linux-${{ matrix.arch }}/native/libsodium.so

    build-macos:
        runs-on: ${{ matrix.runs_on }}
        strategy:
            matrix:
                include:
                    - arch: x64
                      runs_on: macos-13
                      expected_arch: x86_64
                    - arch: arm64
                      runs_on: macos-latest
                      expected_arch: arm64

        steps:
            - uses: actions/checkout@v6

            - name: Install deps
              run: |
                  brew install autoconf automake libtool

            - name: Download libsodium
              run: |
                  curl -L https://download.libsodium.org/libsodium/releases/libsodium-1.0.21.tar.gz -o sodium.tar.gz
                  tar xzf sodium.tar.gz

            - name: Build libsodium
              run: |
                  cd libsodium-*
                  ./configure --enable-shared --disable-static
                  make -j$(sysctl -n hw.ncpu)

            - name: Verify binary architecture
              run: |
                  file -L libsodium-*/src/libsodium/.libs/libsodium.dylib
                  file -L libsodium-*/src/libsodium/.libs/libsodium.dylib | grep -qi "${{ matrix.expected_arch }}"

            - name: Copy binary
              run: |
                  mkdir -p DisCatSharp.Voice.Natives/runtimes/osx-${{ matrix.arch }}/native
                  cp -L libsodium-*/src/libsodium/.libs/libsodium.dylib \
                     DisCatSharp.Voice.Natives/runtimes/osx-${{ matrix.arch }}/native/

            - uses: actions/upload-artifact@v7
              with:
                  name: sodium-macos-${{ matrix.arch }}
                  path: DisCatSharp.Voice.Natives/runtimes/osx-${{ matrix.arch }}/native/libsodium.dylib

    build-windows:
        runs-on: windows-2025-vs2026

        steps:
            - uses: actions/checkout@v6

            - name: Download libsodium
              run: |
                  Invoke-WebRequest https://download.libsodium.org/libsodium/releases/libsodium-1.0.21-msvc.zip -OutFile sodium.zip
                  Expand-Archive sodium.zip

            - name: Copy x64 release DLL
              shell: pwsh
              run: |
                    New-Item -ItemType Directory -Force -Path DisCatSharp.Voice.Natives/runtimes/win-x64/native

                    $dll = Get-ChildItem -Recurse -Filter libsodium.dll | Where-Object {
                        $_.FullName -match "x64.*dynamic"
                    } | Select-Object -First 1

                    Copy-Item $dll.FullName DisCatSharp.Voice.Natives/runtimes/win-x64/native/libsodium.dll

            - uses: actions/upload-artifact@v7
              with:
                  name: sodium-win-x64
                  path: DisCatSharp.Voice.Natives/runtimes/win-x64/native/libsodium.dll
