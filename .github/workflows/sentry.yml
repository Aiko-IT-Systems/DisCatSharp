name: "Sentry Release"

on:
    release:
        types:
            - published

permissions: write-all

jobs:
    release:
        name: Sentry Release
        runs-on: ubuntu-latest
        steps:
            - name: "Checkout repository"
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - name: Extract version from Version.targets
              id: vars
              shell: bash
              run: |
                  VERSION=$(grep -oP '(?<=<VersionPrefix>)[^<]+' DisCatSharp.Targets/Version.targets)
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
                  # Determine environment from release tag
                  if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
                    echo "environment=dev" >> $GITHUB_OUTPUT
                  else
                    echo "environment=production" >> $GITHUB_OUTPUT
                  fi
            - name: "Create Sentry release"
              uses: getsentry/action-release@v3.6.0
              env:
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
                  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
                  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
              with:
                  environment: ${{ steps.vars.outputs.environment }}
                  ignore_missing: true
                  version: DisCatSharp@${{ steps.vars.outputs.version }}+${{ steps.vars.outputs.sha }}
